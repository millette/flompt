<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF3570"/>
      <stop offset="100%" style="stop-color:#e0245a"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Workflow icon (simplified) -->
  <g fill="none" stroke="white" stroke-width="28" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top node -->
    <rect x="176" y="80" width="160" height="80" rx="16" fill="rgba(255,255,255,0.2)" stroke="white"/>
    <!-- Bottom left node -->
    <rect x="56" y="320" width="160" height="80" rx="16" fill="rgba(255,255,255,0.2)" stroke="white"/>
    <!-- Bottom right node -->
    <rect x="296" y="320" width="160" height="80" rx="16" fill="rgba(255,255,255,0.2)" stroke="white"/>
    <!-- Connection lines -->
    <line x1="216" y1="160" x2="136" y2="320"/>
    <line x1="296" y1="160" x2="376" y2="320"/>
    <!-- Center dot -->
    <circle cx="256" cy="240" r="14" fill="white" stroke="none"/>
  </g>
</svg>
