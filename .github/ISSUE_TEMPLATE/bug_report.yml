name: 🐛 Bug Report
description: Something is broken or not working as expected
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: "When I do X, Y happens instead of Z."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Paste prompt '...'
        3. Click '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: context
    attributes:
      label: Where does the bug occur?
      options:
        - Web app (flompt.dev/app)
        - Browser extension (Chrome)
        - Browser extension (Firefox)
        - Claude Code MCP integration
        - Self-hosted instance
        - Other
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser (if applicable)
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Not applicable
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or error messages
      description: Paste any relevant screenshots, console errors, or network responses.
      placeholder: "Drag and drop images here, or paste error text."

  - type: textarea
    id: context-extra
    attributes:
      label: Additional context
      description: Anything else that might help (OS, self-hosted setup, API provider used, etc.).
